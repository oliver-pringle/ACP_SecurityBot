services:
  securitybot-api:
    build:
      context: ./SecurityBot.Api
    container_name: securitybot-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Sqlite=Data Source=/data/securitybot.db;Cache=Shared
      # Restrict the Host header allowlist to the docker-compose service name +
      # localhost. If you publish ports or rename the service, update this list
      # (or set AllowedHosts in your shell env before `docker compose up`).
      # Includes the shared gateway host so Caddy on the droplet can proxy
      # https://api.acp-metabot.dev/securitybot/* to this container (path-based
      # Resources routing - see workspace CLAUDE.md). securitybot-api +
      # localhost cover the docker bridge + local probes.
      - AllowedHosts=securitybot-api;localhost;api.acp-metabot.dev
      # REQUIRED in any non-Development environment - Program.cs fails fast at
      # boot if ASPNETCORE_ENVIRONMENT != "Development" and this env var is
      # empty. Set SECURITYBOT_API_KEY in your host shell (or in
      # ./acp-v2/.env, which docker compose auto-loads at the project root via
      # `--env-file`) to a high-entropy random string. Use `:?...` expansion to
      # fail compose-up early with a clear message instead of failing inside
      # the container at boot.
      - SECURITYBOT_API_KEY=${SECURITYBOT_API_KEY:?SECURITYBOT_API_KEY is required (high-entropy random string, e.g. `openssl rand -hex 32`)}
      # REQUIRED in non-Development (audit F3, 2026-05-25). 32 bytes of random
      # base64. Generate with `openssl rand -base64 32`. Set on the host shell
      # before `docker compose up` - the `:?...` expansion below fails compose-
      # up early with a clear message if it's missing. For transitional
      # plaintext deploys, set SECURITYBOT_ALLOW_PLAINTEXT_WEBHOOK_SECRETS=true
      # in the host shell INSTEAD of providing the key - this comments the
      # key var out by giving it an empty default, and the boot warns loudly.
      - WEBHOOK_SECRET_ENCRYPTION_KEY=${WEBHOOK_SECRET_ENCRYPTION_KEY:-}
      - SECURITYBOT_ALLOW_PLAINTEXT_WEBHOOK_SECRETS=${SECURITYBOT_ALLOW_PLAINTEXT_WEBHOOK_SECRETS:-}
      # OPTIONAL (audit F5, 2026-05-25). When the bot sits behind Caddy on the
      # droplet, tighten to the exact Caddy bridge subnet (e.g. 172.23.0.0/24).
      # Defaults to 172.16.0.0/12 + loopback v4/v6 - fine for local Docker.
      - TRUSTED_PROXY_NETWORKS=${TRUSTED_PROXY_NETWORKS:-172.16.0.0/12,127.0.0.0/8,::1/128}
      # Proactive-outreach kill-switch. SecurityBot ships NO outreach worker in
      # v1 - this default-OFF flag + the boot log keep the passive-auditor
      # posture conscious. Any future cold-mail worker MUST gate on this.
      - SECURITYBOT_OUTREACH_ENABLED=${SECURITYBOT_OUTREACH_ENABLED:-false}
    volumes:
      # Bind-mount must be writable by UID 1654 (the .NET 10 `app` user). One-time
      # setup on a fresh host: `mkdir -p data && sudo chown 1654:1654 data`.
      - ./data:/data
    # api joins the internal securitybot net (sidecar reaches it) PLUS the two
    # external bridges: acp-shared (cross-bot calls, e.g. EASIssuer anchoring)
    # and caddy_proxy (the shared Caddy gateway proxies /securitybot/* here).
    # Both must already exist on the droplet:
    #   docker network create acp-shared   (one-time, portfolio-wide)
    #   docker network create caddy_proxy   (created with the Caddy stack)
    networks: [securitybot, acp-shared, caddy_proxy]
    # No ports published - only the sidecar + the shared Caddy talk to it.

  securitybot-acp:
    build:
      context: ./acp-v2
    container_name: securitybot-acp
    restart: unless-stopped
    depends_on: [securitybot-api]
    env_file: ./acp-v2/.env
    environment:
      - SECURITYBOT_API_URL=http://securitybot-api:5000
      # streamPush binds 127.0.0.1 by default (safe). Multi-container Docker
      # needs 0.0.0.0 so the API container can reach it across the docker
      # bridge - the bridge itself is the trust boundary, NOT this port.
      # CRITICAL: do NOT publish this port to the host via `ports:` - it
      # carries inJobStream tick deliveries and is X-API-Key-gated, but
      # treating the docker bridge as the perimeter is the design intent.
      - SECURITYBOT_STREAM_PUSH_BIND_HOST=0.0.0.0
      # Forward-compat: when the sidecar's resources.ts is wired to emit
      # absolute Resource URLs under the shared gateway, set this to
      # https://api.acp-metabot.dev/securitybot. Today resources.ts hardcodes
      # paths, so this is a no-op default-empty - harmless to carry.
      - PUBLIC_RESOURCES_BASE_URL=${PUBLIC_RESOURCES_BASE_URL:-}
    networks: [securitybot]

networks:
  securitybot:
    driver: bridge
  acp-shared:
    external: true
  caddy_proxy:
    external: true
